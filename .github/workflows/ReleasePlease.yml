name: Release Please

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node

      # release_created=true 일 때만 npm 배포 실행
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - name: Setup Node.js
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: npm install

      - name: Type check
        if: ${{ steps.release.outputs.release_created }}
        run: npm run typeCheck

      - name: Test
        if: ${{ steps.release.outputs.release_created }}
        run: npm run test

      - name: Build
        if: ${{ steps.release.outputs.release_created }}
        run: npm run build

